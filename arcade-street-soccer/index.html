<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arcade Street Soccer</title>
    <style>
        body {
            margin: 0;
            background: #111;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Press Start 2P', monospace, 'Courier New', monospace;
            color: #fff;
        }
        #game-container {
            border: 4px solid #333;
            box-shadow: 0 0 40px rgba(255, 60, 0, 0.2);
        }
        .instructions {
            position: absolute;
            bottom: 20px;
            text-align: center;
            font-size: 11px;
            color: #888;
            line-height: 1.8;
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
</head>
<body>
    <div id="game-container"></div>
    <div class="instructions">
        ARROWS: Move Left / Right | Z: Kick | X: KINETIC KICK (50 Stamina)<br>
        First to 5 wins
    </div>
    <script src="game.js"></script>
</body>
</html>
